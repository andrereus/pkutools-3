<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded gradient tile, transparent corners — the DEFAULT icon shape.
       Consumers:
       1. In-app logo (app/assets/pkutools-logo.svg is a copy of this file).
       2. Manifest icons public/pwa-64/192/512.png: desktop PWA (Windows shows
          as-is, macOS re-masks with its own near-identical squircle), browser
          install UI, and the WebAPK splash on Android.
       3. PWABuilder "Icon URL" → /pwa-512x512.png: TWA splash + legacy (<8)
          launcher.
       Squares stay square on purpose: apple-touch (iOS blackens transparency),
       logo-512 (SEO + the Play listing upload), maskable (Android masks it).
       If a TWA test build shows a faint ring around the splash tile
       (transparency compositing, Bubblewrap issue #488), fork a splash-only
       master with a solid #0ea5e9 rect under the clipped group instead of
       editing this one. -->

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <clipPath id="corners">
      <rect width="512" height="512" rx="114"/>
    </clipPath>
  </defs>
  <g clip-path="url(#corners)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <g fill="#ffffff">
      <g transform="rotate(-45 256 256) translate(256 256) scale(1.08) translate(-256 -256)">
        <rect x="206" y="76" width="24" height="92" rx="12"/>
        <rect x="244" y="76" width="24" height="92" rx="12"/>
        <rect x="282" y="76" width="24" height="92" rx="12"/>
        <path d="M206 148 L306 148 L306 168 C306 192 290 202 276 206 L276 410 C276 425 268 436 256 436 C244 436 236 425 236 410 L236 206 C222 202 206 192 206 168 Z"/>
      </g>
      <g transform="rotate(45 256 256) translate(256 256) scale(1.08) translate(-256 -256)">
        <rect x="238" y="76" width="36" height="26" rx="8"/>
        <rect x="238" y="108" width="36" height="256"/>
        <path d="M238 364 L274 364 L261 416 C258 426 254 426 251 416 Z"/>
      </g>
    </g>
  </g>
</svg>
